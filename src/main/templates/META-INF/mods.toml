modLoader = "javafml"
loaderVersion = "${loader_version_range}"
license = "${mod_license}"
issueTrackerURL = "https://github.com/NadirKhoulali/Ultimate-Banking-System-UBS/issues"

[[mods]]
modId = "${mod_id}"
version = "${mod_version}"
displayName = "${mod_name}"
displayURL = "https://github.com/NadirKhoulali/Ultimate-Banking-System-UBS"
authors = "NadirKhoulali"
description = '''
Ultimate Banking System (UBS) is a full-economy Forge mod for Minecraft 1.20.1.
It adds secure multi-account banking, ATM and bank-owner PC interfaces, physical dollar bills,
bank notes, cheques, pay requests, transaction history, lending, and central-bank regulation tools.
Designed for survival and roleplay servers, UBS also provides a documented developer API for
integration with shops, jobs, scoreboards, and custom economy gameplay.
'''

[[dependencies.${mod_id}]]
modId = "forge"
mandatory = true
versionRange = "${forge_version_range}"
ordering = "NONE"
side = "BOTH"

[[dependencies.${mod_id}]]
modId = "minecraft"
mandatory = true
versionRange = "${minecraft_version_range}"
ordering = "NONE"
side = "BOTH"
