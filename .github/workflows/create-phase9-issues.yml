          create_issue(
              title="As a Player, I want founding a bank to require a non-refundable charter fee paid to the Central Bank so that there is a meaningful economic barrier to entry and reckless bank creation is discouraged",
              body="""## User Story
          As a Player, I want founding a bank to require a non-refundable charter fee paid to the Central Bank so that there is a meaningful economic barrier to entry and reckless bank creation is discouraged.

          ## Acceptance Criteria
          - [ ] A configurable `bankCharterFee` (default: 10000) is added to the mod config
          - [ ] During bank creation (the `/bank create` flow) the system checks whether the founding player's primary account has sufficient balance to cover the charter fee
          - [ ] If the player has sufficient funds, the fee is deducted from their account and credited to the Central Bank's reserve before the bank is registered
          - [ ] If the player cannot afford the fee, bank creation is aborted with a clear error message showing the required amount and their current balance
          - [ ] The charter fee payment is recorded as a `BankToUserTransaction` in the Central Bank's ledger with a `CHARTER_FEE` type tag
          - [ ] The fee amount is shown to the player during the creation confirmation step so they can back out before paying
          - [ ] Admins can waive the charter fee for a specific creation using `/bank admin waivefee` before the player submits their application

          ## Benefits
          - [ ] Introduces a meaningful economic cost that prevents players from casually creating dozens of throwaway banks
          - [ ] Transfers value into the Central Bank reserve, reinforcing the CB as the monetary anchor of the server
          - [ ] Mirrors the real-world concept of a bank charter application fee and regulatory capital requirement

          ## Considerations
          - [ ] The charter fee should scale with server inflation if an inflation metric is implemented
          - [ ] Distinguish the charter fee (one-time founding cost) from the ongoing annual license renewal fee
          - [ ] The fee should not be refunded if the bank is later dissolved by the owner or suspended by an admin
          - [ ] Ensure the fee deduction and bank registration happen atomically to prevent exploits""",
              labels=["feature", "banking", "economy", "phase-8"],
              milestone=PHASE8,
          )

          create_issue(
              title="As a Bank Owner, I want to participate in an inter-bank overnight lending market where banks with surplus reserves can lend to banks with deficits so that liquidity flows freely between player banks",
              body="""## User Story
          As a Bank Owner, I want to participate in an inter-bank overnight lending market where banks with surplus reserves can lend to banks with deficits so that liquidity flows freely between player banks.

          ## Acceptance Criteria
          - [ ] Bank owners can post a lending offer via `/bank lend offer <amount> <annualRate> <termTicks>` — this creates a visible offer in the inter-bank lending market
          - [ ] Bank owners can browse available offers with `/bank lend market` which lists: lender bank, amount available, offered rate, and term
          - [ ] Bank owners can accept an offer with `/bank lend accept <offerId>` — this triggers a `BankToBankTransaction` moving the agreed amount from lender to borrower reserve
          - [ ] Accepted loans are tracked on both the lender and borrower `Bank` objects with a `InterbankLoan` record (persisted in NBT)
          - [ ] At maturity, repayment (principal + interest calculated using the agreed rate) is automatically processed via a `BankToBankTransaction` from borrower to lender
          - [ ] If the borrower cannot repay at maturity, their reserve is partially seized up to the outstanding balance and the shortfall is logged for admin review
          - [ ] Outstanding inter-bank loans appear in `/bank dashboard` for both lender and borrower

          ## Benefits
          - [ ] Enables a self-regulating inter-bank liquidity market without requiring admin intervention
          - [ ] Gives surplus-reserve banks a way to earn passive interest income beyond savings account payouts
          - [ ] Models the real-world federal funds market where banks lend excess reserves overnight

          ## Considerations
          - [ ] The Central Bank should not participate as a borrower in this market (use the discount window instead)
          - [ ] Offer expiry: unaccepted offers should expire after a configurable number of ticks
          - [ ] Maximum inter-bank exposure: cap how much any single bank can owe to other banks as a % of its deposits
          - [ ] All inter-bank loan events should route through the Central Bank clearing ledger for auditability""",
              labels=["feature", "banking", "economy", "loans", "phase-9"],
              milestone=PHASE9,
          )

