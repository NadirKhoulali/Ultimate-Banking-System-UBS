              body="""## User Story
          As a Server Admin, I want player banks to pay an annual license renewal fee to the Central Bank so that inactive or under-capitalised banks face a recurring cost that incentivises active management.

          ## Acceptance Criteria
          - [ ] A configurable `bankAnnualLicenseFee` (default: 2000) is added to the mod config
          - [ ] The fee is automatically deducted from the bank's reserve once per in-game year (configurable tick interval)
          - [ ] Bank owners receive a warning notification 7 in-game days before the fee is due
          - [ ] If the bank's reserve is insufficient to cover the fee, the bank enters WARNING status and the owner has a configurable grace period to replenish
          - [ ] If the grace period expires without payment, the bank is automatically suspended (same as reserve non-compliance in the CB audit issue)
          - [ ] Fee collection is recorded in the Central Bank's clearing ledger with a `LICENSE_FEE` tag
          - [ ] Admins can defer or waive a fee for a specific bank using `/bank admin deferrenwal <bankName>`
          - [ ] `/bank info <bankName>` shows the next renewal date and fee amount

          ## Benefits
          - [ ] Discourages "ghost banks" — banks created and then abandoned by owners who have moved on
          - [ ] Creates a steady inflow into the Central Bank reserve that can fund open market operations
          - [ ] Adds a realistic recurring operational cost that bank owners must plan for

          ## Considerations
          - [ ] The fee should be proportional to the bank's total deposit base to be fair across banks of different sizes — consider making it a percentage rather than a flat amount
          - [ ] New banks should receive a grace period (e.g., the first 30 in-game days) before their first fee is due
          - [ ] Fee deferral history should be auditable to prevent admins from abusing the waiver
          - [ ] Consider whether the Central Bank itself should be exempt from the fee (it should)""",
              labels=["feature", "banking", "economy", "admin", "phase-9"],
              milestone=PHASE9,
          )

